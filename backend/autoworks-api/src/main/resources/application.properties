spring.application.name=autoworks-api

spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5434/autoworks_api}
spring.datasource.username=${POSTGRES_USER:admin}
spring.datasource.password=${POSTGRES_PASSWORD:admin}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

app.security.jwt.secret=${JWT_SECRET:change-this-development-secret-with-at-least-32-characters}
app.security.jwt.expiration-seconds=${JWT_EXPIRATION_SECONDS:86400}